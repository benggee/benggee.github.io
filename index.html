<head>

<body>
  <div id="app"></div>

    window.$docsify = {
      name: '程序员班吉',
      repo: '',
      loadSidebar: true,

        depth: 6

      copyCode: {
        buttonText: '复制',
        errorText: '错误',

      },
      pagination: {
        previousText: '上一页',
        nextText: '下一页'
      },
      plugins: [
   		 function(hook, vm) {

        		'</p>',
        		'</footer>'
      		].join('');

      		hook.afterEach(function(html) {
        		return html + footer;
      		});
    	 }
  	  ]
	};
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
